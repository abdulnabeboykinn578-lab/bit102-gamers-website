<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - Home</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Base Styles */
        body {
            background-color: white; 
            color: black;
            font-family: Arial, sans-serif; 
        }

        .btn, .form-control, .card, .border {
            border-radius: 0 !important; 
        }

        .navbar {
            background-color: white !important; 
            border-bottom: 2px solid #dddddd; 
        }

        .navbar-brand {
            font-weight: bold;
            color: black !important;
            letter-spacing: 1px;
        }

        .nav-link {
            color: black !important; 
        }
        
        .nav-link:hover {
            color: blue !important; 
        }

        /* Welcome Section */
        .welcome-box {
            background-color: #212529; 
            color: white;
            padding: 80px 20px;
            text-align: center;
            margin-top: 56px; 
            border-bottom: 5px solid blue; 
        }

        /* Title Styles */
        .fancy-title {
            font-family: 'Arial Black', Impact, sans-serif; 
            font-weight: 900;
            font-size: 1.8rem;
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: black;
            border-left: 6px solid blue; 
            padding-left: 12px;
            margin-bottom: 25px;
        }

        .post-card, .sidebar-box {
            background-color: white;
            border: 1px solid #cccccc;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 3px 3px 5px #cccccc; 
        }
        
        .post-card {
            display: none; 
        }

        /* Class to show cards */
        .show-card {
            display: block;
        }

        .post-title {
            color: #0d6efd;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .post-title:hover {
            text-decoration: underline; 
            color: blue;
        }

        .post-meta {
            font-size: 0.85rem;
            color: #6c757d; 
        }
    </style>
</head>
