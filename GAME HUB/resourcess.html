<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Discovery & Resources</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --steam-dark: #171a21;
            --steam-blue: #1b2838;
            --steam-light-blue: #66c0f4;
            --steam-nav: #2a475e;
            --steam-text: #c1c2c4;
        }
        body { background-color: #0b0e14; color: var(--steam-text); font-family: 'Segoe UI', sans-serif; }
        
        /* 导航栏：连接组员页面  */
        .navbar { background-color: var(--steam-dark); border-bottom: 2px solid var(--steam-nav); }
        .nav-link { color: #dcdedf !important; transition: 0.3s; }
        .nav-link:hover { color: var(--steam-light-blue) !important; }

        /* 侧边栏分类 [cite: 49, 90] */
        .sidebar { background-color: var(--steam-blue); border-radius: 4px; padding: 15px; position: sticky; top: 80px; }
        .list-group-item { background-color: transparent; color: var(--steam-light-blue); border: none; cursor: pointer; transition: 0.3s; }
        .list-group-item:hover, .list-group-item.active { background-color: #2a475e; color: white; }

        /* 顶部大类卡片 */
        .cat-card {
            height: 100px; background-size: cover; background-position: center; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s; border: 1px solid transparent; margin-bottom: 15px;
        }
        .cat-card:hover { transform: scale(1.05); border-color: white; }
        .cat-card span { background: rgba(255, 255, 255, 0.9); color: black; padding: 5px 10px; font-weight: bold; font-size: 0.8rem; }

        /* 游戏卡片 [cite: 89, 90] */
        .game-card { background: linear-gradient(to bottom, #2a475e 0%, #1b2838 100%); border: none; transition: 0.3s; height: 100%; }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 0 15px var(--steam-light-blue); }
        .card-img-top { height: 180px; object-fit: cover; background-color: #000; }
        .rating-stars { color: #ffc107; font-size: 0.9rem; }
        .search-box { background-color: #2a475e; border: none; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">GAME <span style="color: var(--steam-light-blue);">HUB</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">主页 (Home)</a></li>
                    <li class="nav-item"><a class="nav-link" href="community.html">社区 (Community)</a></li>
                    <li class="nav-item"><a class="nav-link active" href="resources.html">攻略 (Resources)</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <input class="form-control search-box btn-sm" type="search" id="gameSearch" placeholder="搜索游戏..." onkeyup="searchGames()">
                    <a href="login.html" class="btn btn-outline-info btn-sm">登录 (Login)</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-6 mb-4">
            <div class="col" onclick="filterCategory('fps')"><div class="cat-card" style="background-image: url('https://wallpapercave.com/wp/wp1917128.jpg')"><span>FPS</span></div></div>
            <div class="col" onclick="filterCategory('moba')"><div class="cat-card" style="background-image: url('https://wallpapercave.com/wp/wp1810629.jpg')"><span>MOBA</span></div></div>
            <div class="col" onclick="filterCategory('action')"><div class="cat-card" style="background-image: url('https://wallpapercave.com/wp/wp11409247.jpg')"><span>ACTION</span></div></div>
            <div class="col" onclick="filterCategory('adventure')"><div class="cat-card" style="background-image: url('https://wallpapercave.com/wp/wp5266935.jpg')"><span>ADVENTURE</span></div></div>
            <div class="col" onclick="filterCategory('rpg')"><div class="cat-card" style="background-image: url('https://wallpapercave.com/wp/wp1893110.jpg')"><span>RPG</span></div></div>
            <div class="col" onclick="filterCategory('strategy')"><div class="cat-card" style="background-image: url('https://wallpapercave.com/wp/wp1934005.jpg')"><span>STRATEGY</span></div></div>
        </div>

        <div class="row">
            <div class="col-12 col-lg-3 mb-4">
                <div class="sidebar shadow">
                    <h5 class="text-white mb-3">按类型浏览</h5>
                    <div class="list-group" id="categoryList">
                        <button class="list-group-item list-group-item-action active" onclick="filterCategory('all', this)">所有游戏</button>
                        <button class="list-group-item list-group-item-action" onclick="filterCategory('fps', this)">第一人称射击 (FPS)</button>
                        <button class="list-group-item list-group-item-action" onclick="filterCategory('moba', this)">多人竞技 (MOBA)</button>
                        <button class="list-group-item list-group-item-action" onclick="filterCategory('action', this)">动作游戏 (Action)</button>
                        <button class="list-group-item list-group-item-action" onclick="filterCategory('adventure', this)">冒险解谜 (Adventure)</button>
                        <button class="list-group-item list-group-item-action" onclick="filterCategory('rpg', this)">角色扮演 (RPG)</button>
                        <button class="list-group-item list-group-item-action" onclick="filterCategory('strategy', this)">策略战争 (Strategy)</button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 id="displayTitle" style="border-left: 5px solid var(--steam-light-blue); padding-left:15px; color:white;">所有游戏资源</h2>
                    <button class="btn btn-sm btn-secondary" onclick="resetAll()">重置</button>
                </div>
                <div class="row g-4" id="gameGrid">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 5. 核心数据库：每个类别 5-6 个游戏，图片精准对应
        const games = [
            // MOBA
            { type: 'moba', title: 'League of Legends', rating: 5, desc: '最火热的 5v5 团队竞技游戏。', img: 'https://images.alphacoders.com/132/1322204.jpeg' },
            { type: 'moba', title: 'Dota 2', rating: 5, desc: '极具深度的硬核 MOBA 竞技。', img: 'https://images2.alphacoders.com/474/474206.jpg' },
            { type: 'moba', title: 'Honor of Kings', rating: 4, desc: '移动端顶尖多人竞技体验。', img: 'https://images5.alphacoders.com/134/1344427.png' },
            { type: 'moba', title: 'Heroes of the Storm', rating: 3, desc: '暴雪群星汇聚的团队对战。', img: 'https://images3.alphacoders.com/603/603738.jpg' },
            { type: 'moba', title: 'Pokémon UNITE', rating: 4, desc: '宝可梦主题的轻松竞技。', img: 'https://images2.alphacoders.com/115/1155981.jpg' },
            
            // ADVENTURE
            { type: 'adventure', title: 'Elden Ring', rating: 5, desc: '交界地的史诗级冒险之旅。', img: 'https://images.alphacoders.com/115/1152062.jpg' },
            { type: 'adventure', title: 'The Legend of Zelda', rating: 5, desc: '探索广袤的海拉鲁大陆。', img: 'https://images8.alphacoders.com/791/791002.jpg' },
            { type: 'adventure', title: 'Rise of the Tomb Raider', rating: 4, desc: '跟随劳拉探索古墓之谜。', img: 'https://images2.alphacoders.com/653/653240.jpg' },
            { type: 'adventure', title: 'Red Dead Redemption 2', rating: 5, desc: '西部荒野的壮丽冒险史诗。', img: 'https://images6.alphacoders.com/911/911516.jpg' },
            { type: 'adventure', title: 'Horizon Zero Dawn', rating: 4, desc: '机械生物横行的末世探险。', img: 'https://images7.alphacoders.com/841/841103.jpg' },

            // FPS
            { type: 'fps', title: 'Counter-Strike 2', rating: 5, desc: '纯粹的战术射击竞技。', img: 'https://images6.alphacoders.com/133/1333190.jpeg' },
            { type: 'fps', title: 'Valorant', rating: 5, desc: '英雄技能与射击的融合。', img: 'https://images2.alphacoders.com/108/1084281.jpg' },
            { type: 'fps', title: 'Call of Duty', rating: 4, desc: '电影级的射击作战体验。', img: 'https://images6.alphacoders.com/103/1034458.jpg' },
            { type: 'fps', title: 'Overwatch 2', rating: 3, desc: '团队协作的英雄射击游戏。', img: 'https://images7.alphacoders.com/123/1236055.jpg' },
            { type: 'fps', title: 'Apex Legends', rating: 4, desc: '快节奏的英雄战术竞技。', img: 'https://images8.alphacoders.com/985/985090.jpg' },

            // ACTION
            { type: 'action', title: 'Black Myth: Wukong', rating: 5, desc: '国产单机巅峰，直面天命。', img: 'https://images7.alphacoders.com/136/1367013.jpeg' },
            { type: 'action', title: 'Sekiro: Shadows Die Twice', rating: 5, desc: '极致的拼刀对决体验。', img: 'https://images7.alphacoders.com/100/1001402.jpg' },
            { type: 'action', title: 'Devil May Cry 5', rating: 5, desc: '华丽的动作连招盛宴。', img: 'https://images7.alphacoders.com/925/925181.jpg' },
            { type: 'action', title: 'God of War', rating: 5, desc: '奎托斯的北欧新征程。', img: 'https://images3.alphacoders.com/128/1286084.jpg' },
            { type: 'action', title: 'Bayonetta 3', rating: 4, desc: '巅峰级的魔女动作战斗。', img: 'https://images4.alphacoders.com/117/1174966.jpg' }
        ];

        // 6. 渲染与过滤逻辑 [cite: 54, 57]
        function render(data) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = data.length ? data.map(g => `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card game-card text-white shadow">
                        <img src="${g.img}" class="card-img-top" onerror="this.src='https://via.placeholder.com/400x200/1b2838/ffffff?text=Loading...'">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title h6">${g.title}</h5>
                            <div class="rating-stars mb-3">${'★'.repeat(g.rating)}${'☆'.repeat(5-g.rating)}</div>
                            <p class="small text-secondary flex-grow-1">${g.desc}</p>
                            <button class="btn btn-sm btn-outline-info w-100 mt-2">查看详情</button>
                        </div>
                    </div>
                </div>
            `).join('') : '<div class="col-12 text-center py-5"><h5>未找到匹配结果</h5></div>';
        }

        function filterCategory(type, element) {
            if(element) {
                document.querySelectorAll('.list-group-item').forEach(b => b.classList.remove('active'));
                element.classList.add('active');
            }
            const filtered = type === 'all' ? games : games.filter(g => g.type === type);
            document.getElementById('displayTitle').innerText = type.toUpperCase() + " 资源专区";
            render(filtered);
        }

        function searchGames() {
            const val = document.getElementById('gameSearch').value.toLowerCase();
            render(games.filter(g => g.title.toLowerCase().includes(val)));
        }

        function resetAll() {
            document.getElementById('gameSearch').value = '';
            filterCategory('all');
        }

        window.onload = () => render(games);
    </script>
</body>
</html>
