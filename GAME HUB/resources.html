<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Discovery & Resources</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d6efd;
        }
        body { background-color: #f8f9fa; color: #212529; font-family: 'Segoe UI', sans-serif; }
        
        /* Navbar */
        .navbar { background-color: #212529; border-bottom: none; }
        .nav-link { color: rgba(255,255,255,.55) !important; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff !important; }

        /* Category Cards */
        .cat-card {
            height: 120px;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
            margin-bottom: 15px;
            position: relative;
        }
        .cat-card:hover { transform: scale(1.05); border-color: var(--primary-color); }
        .cat-card span { 
            background: rgba(255, 255, 255, 0.9); color: #212529; padding: 5px 15px; 
            font-weight: bold; text-transform: uppercase; z-index: 2;
        }

        /* Game Cards */
        .game-card { background: #ffffff; border: 1px solid rgba(0,0,0,.125); transition: 0.3s; height: 100%; }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,.1); }
        .card-img-top { height: 160px; object-fit: cover; background-color: #f8f9fa; }
        
        /* Rating Color */
        .rating { color: #ffc107; font-weight: bold; }
        
        /* Search Input */
        .search-input { background: #ffffff; border: 1px solid #ced4da; color: #212529; }
        .search-input::placeholder { color: #6c757d; }
        .search-input:focus { outline: none; border-color: #86b7fe; box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">GAME <span style="color: var(--primary-color);">HUB</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="community.html">Community</a></li>
                    <li class="nav-item"><a class="nav-link active" href="resources.html">Resources</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <input class="form-control search-input btn-sm" type="search" id="gameSearch" placeholder="Search games..." onkeyup="handleSearch()">
                    <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h5 class="text-dark mb-4">BROWSE BY CATEGORIES</h5>
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-6 mb-5">
            <div class="col" onclick="filterType('fps')"><div class="cat-card" style="background-image: url('https://cdn.akamai.steamstatic.com/steam/apps/730/header.jpg')"><span>FPS</span></div></div>
            <div class="col" onclick="filterType('moba')"><div class="cat-card" style="background-image: url('https://cdn.akamai.steamstatic.com/steam/apps/570/header.jpg')"><span>MOBA</span></div></div>
            <div class="col" onclick="filterType('action')"><div class="cat-card" style="background-image: url('https://cdn.akamai.steamstatic.com/steam/apps/1593500/header.jpg')"><span>ACTION</span></div></div>
            <div class="col" onclick="filterType('adventure')"><div class="cat-card" style="background-image: url('https://cdn.akamai.steamstatic.com/steam/apps/1174180/header.jpg')"><span>ADVENTURE</span></div></div>
            <div class="col" onclick="filterType('rpg')"><div class="cat-card" style="background-image: url('https://cdn.akamai.steamstatic.com/steam/apps/1086940/header.jpg')"><span>RPG</span></div></div>
            <div class="col" onclick="filterType('strategy')"><div class="cat-card" style="background-image: url('https://cdn.akamai.steamstatic.com/steam/apps/289070/header.jpg')"><span>STRATEGY</span></div></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="listTitle" class="text-dark">Popular Resources</h2>
            <button class="btn btn-sm btn-secondary" onclick="resetFilter()">Show All</button>
        </div>
        
        <div class="row g-4" id="gameGrid"></div>
    </div>

    <script>
        const gameData = [
            // MOBA
            
            { type: 'moba', title: 'Dota 2', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/570/header.jpg' },
          
            // ADVENTURE
            { type: 'adventure', title: 'Elden Ring', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1245620/header.jpg' },
            { type: 'adventure', title: 'The Witcher 3: Wild Hunt', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/292030/header.jpg' },
            { type: 'adventure', title: 'Rise of the Tomb Raider', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/391220/header.jpg' },
            { type: 'adventure', title: 'Red Dead Redemption 2', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1174180/header.jpg' },

            // FPS
            { type: 'fps', title: 'Counter-Strike 2', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/730/header.jpg' },
            { type: 'fps', title: 'Call of Duty', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1938090/header.jpg' },
            { type: 'fps', title: 'Apex Legends', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1172470/header.jpg' },

            // ACTION
            { type: 'action', title: 'Black Myth: Wukong', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/2358720/header.jpg' },
            { type: 'action', title: 'Sekiro: Shadows Die Twice', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/814380/header.jpg' },
            { type: 'action', title: 'Devil May Cry 5', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/601150/header.jpg' },
            { type: 'action', title: 'God of War', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1593500/header.jpg' },
            { type: 'action', title: 'Nioh 2', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1300860/header.jpg' },

            // RPG
            { type: 'rpg', title: 'Cyberpunk 2077', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1091500/header.jpg' },
            { type: 'rpg', title: 'Baldur\'s Gate 3', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1086940/header.jpg' },
            { type: 'rpg', title: 'Starfield', rating: 3, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1716740/header.jpg' },
            { type: 'rpg', title: 'Horizon Forbidden West', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/2420110/header.jpg' },

            // STRATEGY
            { type: 'strategy', title: 'Civilization VI', rating: 5, img: 'https://cdn.akamai.steamstatic.com/steam/apps/289070/header.jpg' },
            { type: 'strategy', title: 'Total War: Three Kingdoms', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/779340/header.jpg' },
            { type: 'strategy', title: 'Age of Empires IV', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/1466860/header.jpg' },
            { type: 'strategy', title: 'Hearts of Iron IV', rating: 4, img: 'https://cdn.akamai.steamstatic.com/steam/apps/394360/header.jpg' }
        ];

        function render(items) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = items.length > 0 ? items.map(item => `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card game-card text-dark shadow-sm">
                        <img src="${item.img}" class="card-img-top" alt="${item.title}" onerror="this.src='https://via.placeholder.com/400x160/f8f9fa/212529?text=Game+Resource'">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title h6">${item.title}</h5>
                            <div class="rating mb-3">⭐ Rating: ${item.rating}/5</div>
                            <button class="btn btn-sm btn-primary w-100 mt-auto">Get Resources</button>
                        </div>
                    </div>
                </div>
            `).join('') : '<div class="col-12 text-center py-5"><h5 class="text-dark">No matching resources found...</h5></div>';
        }

        function filterType(t) {
            document.getElementById('listTitle').innerText = t.toUpperCase() + " Resources";
            render(gameData.filter(g => g.type === t));
        }

        function handleSearch() {
            const query = document.getElementById('gameSearch').value.toLowerCase();
            render(gameData.filter(g => g.title.toLowerCase().includes(query)));
        }

        function resetFilter() {
            document.getElementById('listTitle').innerText = "All Resources";
            document.getElementById('gameSearch').value = "";
            render(gameData);
        }

        window.onload = () => render(gameData);
    </script>
</body>
</html>
